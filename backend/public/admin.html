<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zito Admin</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
        background: #f1f1f1;
        color: #111;
      }
      .card {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 14px;
        max-width: 860px;
      }
      input {
        width: 100%;
        padding: 10px;
        margin: 6px 0;
        border: 1px solid #bbb;
        border-radius: 8px;
        box-sizing: border-box;
      }
      button {
        background: #0a8f43;
        color: #fff;
        border: 0;
        padding: 10px 14px;
        border-radius: 8px;
        cursor: pointer;
      }
      pre {
        background: #0e1b12;
        color: #d8f5df;
        padding: 12px;
        border-radius: 8px;
        overflow: auto;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 8px;
        padding: 8px 0;
        border-bottom: 1px solid #eee;
      }
      .row:last-child {
        border-bottom: 0;
      }
      .meta {
        font-size: 12px;
        color: #666;
      }
      .btn-danger {
        background: #b31f1f;
      }
      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 12px;
      }
      .gallery-item {
        border: 1px solid #e3e3e3;
        border-radius: 10px;
        padding: 8px;
        background: #fafafa;
      }
      .gallery-item img {
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
        border-radius: 8px;
        border: 1px solid #ddd;
        cursor: pointer;
      }
      .gallery-pdf {
        width: 100%;
        aspect-ratio: 1;
        border-radius: 8px;
        border: 1px solid #ddd;
        background: #f4f4f4;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-weight: 700;
        color: #a61c1c;
      }
      .gallery-label {
        margin-top: 6px;
        font-size: 13px;
        font-weight: 600;
      }
      .gallery-file {
        font-size: 12px;
        color: #666;
        word-break: break-word;
      }
      .token-actions {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }
      .gallery-actions {
        display: flex;
        gap: 8px;
        margin: 6px 0 10px 0;
      }
    </style>
  </head>
  <body>
    <h1>Zito Admin Panel</h1>
    <div class="card">
      <label>Admin token</label>
      <input id="token" value="" placeholder="Enter admin token from environment" />
      <div class="token-actions">
        <button type="button" onclick="saveToken()">Save token</button>
        <button type="button" class="btn-danger" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="card">
      <h3>Add Flyer</h3>
      <input id="flyerTitle" placeholder="Title" />
      <input id="flyerPrice" placeholder="Price (e.g. 89 den.)" />
      <input id="flyerImage" placeholder="Flyer URL (optional: pdf/web/image)" />
      <button onclick="addFlyer()">Save Flyer</button>
    </div>

    <div class="card">
      <h3>Add Notification</h3>
      <input id="noteTitle" placeholder="Title" />
      <input id="noteBody" placeholder="Body" />
      <button onclick="addNotification()">Save Notification</button>
    </div>

    <div class="card">
      <h3>Push Broadcast</h3>
      <input id="pushTitle" placeholder="Title" />
      <input id="pushBody" placeholder="Body" />
      <button onclick="sendPush()">Send Push</button>
    </div>

    <div class="card">
      <div class="section-head">
        <h3>Flyers</h3>
        <button onclick="loadFlyers()">Refresh</button>
      </div>
      <div id="flyersList"></div>
    </div>

    <div class="card">
      <div class="section-head">
        <h3>Notifications</h3>
        <button onclick="loadNotifications()">Refresh</button>
      </div>
      <div id="notificationsList"></div>
    </div>

    <div class="card">
      <div class="section-head">
        <h3>Product Prices</h3>
        <button onclick="loadPrices()">Refresh</button>
      </div>
      <div id="pricesList"></div>
    </div>

    <div class="card">
      <div class="section-head">
        <h3>APK Visual Catalog (mockup)</h3>
        <button onclick="loadApkGallery()">Refresh</button>
      </div>
      <h4>Тековни летоци</h4>
      <div class="gallery-actions">
        <button type="button" onclick="openNewUpload('letoci')">Add new (летоци)</button>
      </div>
      <div id="apkCurrentFlyers" class="gallery-grid"></div>
      <h4 style="margin-top: 16px">Најдобри акции</h4>
      <div class="gallery-actions">
        <button type="button" onclick="openNewUpload('akcii')">Add new (акции)</button>
      </div>
      <div id="apkBestDeals" class="gallery-grid"></div>
    </div>

    <pre id="out">Ready.</pre>
    <input id="galleryFileInput" type="file" accept="image/png,image/jpeg,image/webp,application/pdf" style="display: none" />

    <script>
      const base = location.origin;
      const ADMIN_TOKEN_STORAGE_KEY = "zito.admin.token";
      const out = document.getElementById("out");
      const flyersList = document.getElementById("flyersList");
      const notificationsList = document.getElementById("notificationsList");
      const pricesList = document.getElementById("pricesList");
      const apkCurrentFlyers = document.getElementById("apkCurrentFlyers");
      const apkBestDeals = document.getElementById("apkBestDeals");
      const tokenInput = document.getElementById("token");
      const galleryFileInput = document.getElementById("galleryFileInput");
      let pendingUploadTarget = null;

      function adminHeaders() {
        return {
          "Content-Type": "application/json",
          "x-admin-token": document.getElementById("token").value.trim(),
        };
      }

      function escapeHtml(text) {
        return String(text || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function saveToken() {
        const value = tokenInput.value.trim();
        if (!value) {
          out.textContent = "Admin token is empty.";
          return;
        }
        localStorage.setItem(ADMIN_TOKEN_STORAGE_KEY, value);
        out.textContent = "Admin token saved in this browser.";
      }

      function logout() {
        localStorage.removeItem(ADMIN_TOKEN_STORAGE_KEY);
        tokenInput.value = "";
        out.textContent = "Saved admin token removed.";
      }

      async function call(path, body) {
        const res = await fetch(base + path, {
          method: "POST",
          headers: adminHeaders(),
          body: JSON.stringify(body),
        });
        const text = await res.text();
        out.textContent = path + "\n" + text;
        return res.ok;
      }

      async function callUpload(path, body) {
        const headers = {
          "Content-Type": "application/json",
          "x-admin-token": tokenInput.value.trim(),
        };
        const res = await fetch(base + path, {
          method: "POST",
          headers,
          body: JSON.stringify(body),
        });
        const text = await res.text();
        out.textContent = path + "\n" + text;
        return res.ok;
      }

      async function callDelete(path) {
        const res = await fetch(base + path, {
          method: "DELETE",
          headers: adminHeaders(),
        });
        const text = await res.text();
        out.textContent = path + "\n" + text;
        return res.ok;
      }

      async function callGet(path) {
        const res = await fetch(base + path, {
          method: "GET",
          headers: adminHeaders(),
        });
        const text = await res.text();
        if (!res.ok) {
          out.textContent = path + "\n" + text;
          return null;
        }
        return JSON.parse(text);
      }

      async function addFlyer() {
        const ok = await call("/admin/flyers", {
          title: document.getElementById("flyerTitle").value,
          price: document.getElementById("flyerPrice").value,
          image: document.getElementById("flyerImage").value.trim(),
        });
        if (ok) {
          document.getElementById("flyerTitle").value = "";
          document.getElementById("flyerPrice").value = "";
          document.getElementById("flyerImage").value = "";
          await loadFlyers();
        }
      }

      async function addNotification() {
        const ok = await call("/admin/notifications", {
          title: document.getElementById("noteTitle").value,
          body: document.getElementById("noteBody").value,
        });
        if (ok) await loadNotifications();
      }

      async function sendPush() {
        await call("/admin/push-broadcast", {
          title: document.getElementById("pushTitle").value,
          body: document.getElementById("pushBody").value,
        });
      }

      async function loadFlyers() {
        const rows = await callGet("/admin/flyers");
        if (!rows) return;
        flyersList.innerHTML = rows.length
          ? rows
              .map(
                (x) => `
            <div class="row">
              <div>
                <div><strong>${escapeHtml(x.title)}</strong> - ${escapeHtml(x.price)}</div>
                <div class="meta">ID: ${escapeHtml(x.id)}</div>
                ${x.image ? `<div class="meta">URL: <a href="${escapeHtml(x.image)}" target="_blank" rel="noopener noreferrer">${escapeHtml(x.image)}</a></div>` : ""}
              </div>
              <button class="btn-danger" onclick="deleteFlyer('${escapeHtml(x.id)}')">Delete</button>
            </div>`,
              )
              .join("")
          : "<div class='meta'>No flyers</div>";
      }

      async function loadNotifications() {
        const rows = await callGet("/admin/notifications");
        if (!rows) return;
        notificationsList.innerHTML = rows.length
          ? rows
              .map(
                (x) => `
            <div class="row">
              <div>
                <div><strong>${escapeHtml(x.title)}</strong></div>
                <div>${escapeHtml(x.body)}</div>
                <div class="meta">ID: ${escapeHtml(x.id)}</div>
              </div>
              <button class="btn-danger" onclick="deleteNotification('${escapeHtml(x.id)}')">Delete</button>
            </div>`,
              )
              .join("")
          : "<div class='meta'>No notifications</div>";
      }

      async function loadPrices() {
        const rows = await callGet("/admin/prices?limit=300");
        if (!rows) return;
        pricesList.innerHTML = rows.length
          ? rows
              .map(
                (x) => `
            <div class="row">
              <div>
                <div><strong>${escapeHtml(x.name)}</strong> - ${escapeHtml(x.price)} ${escapeHtml(x.currency || "")}</div>
                <div class="meta">Barcode: ${escapeHtml(x.barcode)}${x.unit ? ` | Unit: ${escapeHtml(x.unit)}` : ""}</div>
              </div>
              <button class="btn-danger" onclick="deletePrice('${escapeHtml(x.barcode)}')">Delete</button>
            </div>`,
              )
              .join("")
          : "<div class='meta'>No product prices</div>";
      }

      function renderGallery(target, items) {
        target.innerHTML = items.length
          ? items
              .map(
                (item) => {
                  const lowerFile = String(item.file || "").toLowerCase();
                  const isPdf = lowerFile.endsWith(".pdf");
                  const preview = isPdf
                    ? `<div class="gallery-pdf">PDF</div>`
                    : `<img src="${escapeHtml(item.imageUrl)}" alt="${escapeHtml(item.label)}" loading="lazy"
                        onclick="openReplaceUpload('${escapeHtml(item.group || "")}','${escapeHtml(item.file)}')" />`;
                  const openPdfBtn = isPdf
                    ? `<button type="button" style="margin-top:6px" onclick="window.open('${escapeHtml(item.imageUrl)}','_blank','noopener,noreferrer')">Open PDF</button>`
                    : "";
                  return `
            <div class="gallery-item">
              ${preview}
              <div class="gallery-label">${escapeHtml(item.label)}</div>
              <div class="gallery-file">${escapeHtml(item.file)}</div>
              ${openPdfBtn}
              <button type="button" style="margin-top:6px" onclick="openReplaceUpload('${escapeHtml(item.group || "")}','${escapeHtml(item.file)}')">Upload</button>
              <button type="button" class="btn-danger" style="margin-top:6px" onclick="deleteGalleryItem('${escapeHtml(item.group || "")}','${escapeHtml(item.file)}')">Delete</button>
            </div>`;
                },
              )
              .join("")
          : "<div class='meta'>No images found</div>";
      }

      async function loadApkGallery() {
        const data = await callGet("/admin/apk-gallery");
        if (!data) return;
        const currentFlyers = Array.isArray(data.currentFlyers) ? data.currentFlyers.map((x) => ({ ...x, group: "letoci" })) : [];
        const bestDeals = Array.isArray(data.bestDeals) ? data.bestDeals.map((x) => ({ ...x, group: "akcii" })) : [];
        renderGallery(apkCurrentFlyers, currentFlyers);
        renderGallery(apkBestDeals, bestDeals);
      }

      function openReplaceUpload(group, file) {
        pendingUploadTarget = { mode: "replace", group, file };
        galleryFileInput.click();
      }

      function openNewUpload(group) {
        pendingUploadTarget = { mode: "new", group, file: "" };
        galleryFileInput.click();
      }

      function fileToBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => {
            const result = String(reader.result || "");
            const marker = "base64,";
            const idx = result.indexOf(marker);
            if (idx < 0) {
              reject(new Error("Failed to parse file."));
              return;
            }
            resolve(result.slice(idx + marker.length));
          };
          reader.onerror = () => reject(new Error("Failed to read file."));
          reader.readAsDataURL(file);
        });
      }

      async function handleGalleryFilePicked(event) {
        try {
          const file = event?.target?.files?.[0];
          if (!file || !pendingUploadTarget) return;
          const mimeType = String(file.type || "").toLowerCase();
          const ext = String(file.name || "").toLowerCase().split(".").pop() || "";
          const allowedMime = ["image/png", "image/jpeg", "image/webp", "application/pdf"];
          const allowedExt = ["png", "jpg", "jpeg", "webp", "pdf"];
          if (!allowedMime.includes(mimeType) && !allowedExt.includes(ext)) {
            out.textContent = "Only PNG/JPG/WEBP/PDF files are supported.";
            return;
          }
          const dataBase64 = await fileToBase64(file);
          const targetFile =
            pendingUploadTarget.mode === "replace"
              ? pendingUploadTarget.file
              : pendingUploadTarget.file || file.name;
          const ok = await callUpload("/admin/apk-gallery/upload", {
            group: pendingUploadTarget.group,
            targetFile,
            fileName: file.name,
            mimeType,
            dataBase64,
          });
          if (ok) await loadApkGallery();
        } catch (error) {
          out.textContent = String(error?.message || error || "Upload failed.");
        } finally {
          pendingUploadTarget = null;
          galleryFileInput.value = "";
        }
      }

      async function deleteFlyer(id) {
        if (!confirm("Delete flyer?")) return;
        const ok = await callDelete("/admin/flyers/" + encodeURIComponent(id));
        if (ok) await loadFlyers();
      }

      async function deleteNotification(id) {
        if (!confirm("Delete notification?")) return;
        const ok = await callDelete("/admin/notifications/" + encodeURIComponent(id));
        if (ok) await loadNotifications();
      }

      async function deletePrice(barcode) {
        if (!confirm("Delete price item?")) return;
        const ok = await callDelete("/admin/prices/" + encodeURIComponent(barcode));
        if (ok) await loadPrices();
      }

      async function deleteGalleryItem(group, file) {
        if (!group || !file) return;
        if (!confirm("Delete this file?")) return;
        const ok = await callDelete("/admin/apk-gallery/" + encodeURIComponent(group) + "/" + encodeURIComponent(file));
        if (ok) await loadApkGallery();
      }

      async function boot() {
        const savedToken = localStorage.getItem(ADMIN_TOKEN_STORAGE_KEY);
        if (savedToken) tokenInput.value = savedToken;
        tokenInput.addEventListener("change", saveToken);
        tokenInput.addEventListener("blur", saveToken);
        galleryFileInput.addEventListener("change", handleGalleryFilePicked);
        await loadFlyers();
        await loadNotifications();
        await loadPrices();
        await loadApkGallery();
      }

      boot();
    </script>
  </body>
</html>
